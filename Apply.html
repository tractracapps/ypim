document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n      <button class=\"nav-toggle\" id=\"navToggle\" aria-label=\"Menu\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M4 7h16M4 12h16M4 17h16\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- PAGE HEADER -->\n<section class=\"page-header\">\n  <div class=\"wrap ph-inner reveal\">\n    <span class=\"ph-eyebrow\">Apply to Join YPiM<\u002Fspan>\n    <h1>Take the <span class=\"box\">wheel<\u002Fspan><\u002Fh1>\n    <p class=\"ph-sub\">Complete the form below. It takes less than 5 minutes, and membership is free for every young Nigerian ready to move.<\u002Fp>\n    <div class=\"ph-meta\">\n      <span class=\"ph-chip\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg> Under 5 minutes<\u002Fspan>\n      <span class=\"ph-chip\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg> Free membership<\u002Fspan>\n      <span class=\"ph-chip\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6\"><\u002Fpath><\u002Fsvg> 36 states<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FORM -->\n<section class=\"apply-sec\">\n  <div class=\"wrap apply-wrap\">\n    <form id=\"applyForm\" class=\"form-card reveal\">\n\n      <!-- progress rail -->\n      <div class=\"prail\">\n        <div class=\"prail-step active\" data-step=\"1\"><span class=\"pn\">1<\u002Fspan><span class=\"pl\">Personal<br>Info<\u002Fspan><\u002Fdiv>\n        <div class=\"prail-step\" data-step=\"2\"><span class=\"pn\">2<\u002Fspan><span class=\"pl\">Your<br>Interest<\u002Fspan><\u002Fdiv>\n        <div class=\"prail-step\" data-step=\"3\"><span class=\"pn\">3<\u002Fspan><span class=\"pl\">Terms &amp;<br>Declaration<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Section 1 -->\n      <div class=\"form-sec\" data-sec=\"1\">\n        <span class=\"fs-tag\"><span class=\"fs-n\">1<\u002Fspan> Personal Information<\u002Fspan>\n        <h2>Tell us about you<\u002Fh2>\n        <div class=\"field\"><label>Full Name <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"text\" name=\"fullName\" required=\"\" placeholder=\"Your full name\"><\u002Fdiv>\n        <div class=\"form-row\">\n          <div class=\"field\"><label>Email Address <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"email\" name=\"email\" required=\"\" placeholder=\"you@email.com\"><\u002Fdiv>\n          <div class=\"field\"><label>Phone Number <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"tel\" name=\"phone\" required=\"\" placeholder=\"0800 000 0000\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-row\">\n          <div class=\"field\"><label>Age <span class=\"req\">*<\u002Fspan><\u002Flabel><select name=\"age\" required=\"\"><option value=\"\">Select age range<\u002Foption><option>16 to 18<\u002Foption><option>18 to 27<\u002Foption><option>27 to 35<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field\"><label>Gender<\u002Flabel><select name=\"gender\"><option value=\"\">Select<\u002Foption><option>Male<\u002Foption><option>Female<\u002Foption><option>Prefer not to say<\u002Foption><\u002Fselect><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\"><label>State of Residence <span class=\"req\">*<\u002Fspan><\u002Flabel><select name=\"state\" required=\"\"><option value=\"\">Select your state<\u002Foption><option>Abia<\u002Foption><option>Adamawa<\u002Foption><option>Akwa Ibom<\u002Foption><option>Anambra<\u002Foption><option>Bauchi<\u002Foption><option>Bayelsa<\u002Foption><option>Benue<\u002Foption><option>Borno<\u002Foption><option>Cross River<\u002Foption><option>Delta<\u002Foption><option>Ebonyi<\u002Foption><option>Edo<\u002Foption><option>Ekiti<\u002Foption><option>Enugu<\u002Foption><option>Federal Capital Territory<\u002Foption><option>Gombe<\u002Foption><option>Imo<\u002Foption><option>Jigawa<\u002Foption><option>Kaduna<\u002Foption><option>Kano<\u002Foption><option>Katsina<\u002Foption><option>Kebbi<\u002Foption><option>Kogi<\u002Foption><option>Kwara<\u002Foption><option>Lagos<\u002Foption><option>Nassarawa<\u002Foption><option>Niger<\u002Foption><option>Ogun<\u002Foption><option>Ondo<\u002Foption><option>Osun<\u002Foption><option>Oyo<\u002Foption><option>Plateau<\u002Foption><option>Rivers<\u002Foption><option>Sokoto<\u002Foption><option>Taraba<\u002Foption><option>Yobe<\u002Foption><option>Zamfara<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Section 2 -->\n      <div class=\"form-sec\" data-sec=\"2\">\n        <span class=\"fs-tag\"><span class=\"fs-n\">2<\u002Fspan> Your Interest in YPiM<\u002Fspan>\n        <h2>Why do you want to join?<\u002Fh2>\n        <div class=\"field\">\n          <label>Select all that apply <span class=\"req\">*<\u002Fspan><\u002Flabel>\n          <div class=\"checks\">\n            <label class=\"check\"><input type=\"checkbox\" name=\"interest\" value=\"Skills Development & Training\"> Skills Development &amp; Training<\u002Flabel>\n            <label class=\"check\"><input type=\"checkbox\" name=\"interest\" value=\"Operator Training\"> Operator Training<\u002Flabel>\n            <label class=\"check\"><input type=\"checkbox\" name=\"interest\" value=\"Employment & Business Opportunities\"> Employment &amp; Business Opportunities<\u002Flabel>\n            <label class=\"check\"><input type=\"checkbox\" name=\"interest\" value=\"Leadership, Advocacy & Policy Engagement\"> Leadership, Advocacy &amp; Policy Engagement<\u002Flabel>\n            <label class=\"check\"><input type=\"checkbox\" name=\"interest\" value=\"Innovation & Technology in Mechanization\"> Innovation &amp; Technology in Mechanization<\u002Flabel>\n            <label class=\"check\"><input type=\"checkbox\" name=\"interest\" value=\"Other\"> Other<\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Are you interested in serving in leadership positions in the future?<\u002Flabel>\n          <div class=\"yn\">\n            <label><input type=\"radio\" name=\"leadership\" value=\"yes\"> Yes<\u002Flabel>\n            <label><input type=\"radio\" name=\"leadership\" value=\"no\"> No<\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Section 3: Terms -->\n      <div class=\"form-sec\" data-sec=\"3\">\n        <span class=\"fs-tag\"><span class=\"fs-n\">3<\u002Fspan> Terms &amp; Conditions<\u002Fspan>\n        <h2>Before you submit<\u002Fh2>\n        <p class=\"tc-intro\">By applying for membership you agree to comply with and be bound by these Terms and Conditions. Please read them carefully, then complete the declaration below.<\u002Fp>\n        <div class=\"tc-box\" id=\"tcBox\">\n          <h3><span class=\"tcn\">01<\u002Fspan> About YPiM<\u002Fh3>\n          <p>Young People in Mechanization (YPiM) is a national youth engagement platform established to mobilize, connect, train, and empower young Nigerians to actively participate in agricultural mechanization as operators, service providers, innovators, advocates, researchers, cooperative members, and ecosystem leaders. YPiM is coordinated and supported by TracTrac MSL and may collaborate with public institutions, development organizations, educational institutions, private sector organizations, and other stakeholders.<\u002Fp>\n\n          <h3><span class=\"tcn\">02<\u002Fspan> Eligibility<\u002Fh3>\n          <p>Membership is open to young Nigerians and individuals residing in Nigeria who:<\u002Fp>\n          <ul>\n            <li>Are between the ages 18 to 35;<\u002Fli>\n            <li>Are interested in agricultural mechanization and related sectors;<\u002Fli>\n            <li>Are willing to contribute positively to the objectives of YPiM;<\u002Fli>\n            <li>Provide accurate information during the application process; and<\u002Fli>\n            <li>Agree to abide by these Terms and Conditions and any future guidelines issued by YPiM.<\u002Fli>\n          <\u002Ful>\n\n          <h3><span class=\"tcn\">03<\u002Fspan> Voluntary Participation<\u002Fh3>\n          <p>Participation in YPiM is voluntary. Membership in YPiM does not constitute employment, a contractual engagement, an internship, a consultancy arrangement, or a guarantee of financial compensation. Members acknowledge that participation in YPiM activities, programs, events, campaigns, committees, or volunteer opportunities is undertaken on a voluntary basis unless otherwise expressly communicated in writing.<\u002Fp>\n\n          <h3><span class=\"tcn\">04<\u002Fspan> Membership Benefits<\u002Fh3>\n          <p>Members may have access to opportunities including training programs, workshops and seminars, networking opportunities, mentorship programs, leadership opportunities, cooperative development initiatives, information on mechanization related opportunities, and participation in YPiM activities and events. Access may be subject to eligibility requirements, availability, funding, program capacity, or other criteria determined by YPiM. Membership does not guarantee access to all opportunities.<\u002Fp>\n\n          <h3><span class=\"tcn\">05<\u002Fspan> Member Responsibilities<\u002Fh3>\n          <p>Members agree to:<\u002Fp>\n          <ul>\n            <li>Provide accurate and truthful information;<\u002Fli>\n            <li>Conduct themselves professionally and respectfully;<\u002Fli>\n            <li>Promote the objectives and values of YPiM;<\u002Fli>\n            <li>Respect fellow members, partners, and stakeholders;<\u002Fli>\n            <li>Comply with applicable laws and regulations;<\u002Fli>\n            <li>Avoid actions that may damage the reputation of YPiM or TracTrac MSL; and<\u002Fli>\n            <li>Follow any guidelines, policies, or instructions issued by YPiM.<\u002Fli>\n          <\u002Ful>\n\n          <h3><span class=\"tcn\">06<\u002Fspan> Code of Conduct<\u002Fh3>\n          <p>Members shall not engage in harassment, discrimination, bullying, or abusive behavior; use YPiM platforms for political campaigning or partisan activities; share false, misleading, or harmful information; engage in fraudulent activities; impersonate YPiM representatives without authorization; use YPiM resources for personal gain without approval; or engage in any conduct that may compromise the safety, integrity, or reputation of YPiM. Violation may result in suspension or termination of membership.<\u002Fp>\n\n          <h3><span class=\"tcn\">07<\u002Fspan> Data Privacy and Consent<\u002Fh3>\n          <p>By submitting an application, you consent to the collection, storage, processing, and use of your personal information for purposes including membership administration, program implementation, event management, communication and outreach, monitoring and evaluation, reporting and analytics, and partnership related opportunities relevant to YPiM. YPiM and TracTrac MSL will take reasonable measures to protect personal information and will not sell personal data to third parties. Information may be shared with authorized program partners where necessary for program implementation, training opportunities, events, or related activities.<\u002Fp>\n\n          <h3><span class=\"tcn\">08<\u002Fspan> Photographs, Videos and Media Consent<\u002Fh3>\n          <p>Members participating in YPiM events, trainings, workshops, meetings, or activities may be photographed, recorded, or featured in promotional materials. By participating, members grant YPiM and TracTrac MSL permission to use photographs, video recordings, testimonials, and related content for reports, publications, social media, websites, promotional materials, advocacy campaigns, and other program purposes that are not commercial. Members who do not wish to appear in media materials should notify YPiM in writing before participation.<\u002Fp>\n\n          <h3><span class=\"tcn\">09<\u002Fspan> Intellectual Property<\u002Fh3>\n          <p>All YPiM logos, branding materials, publications, content, documents, training materials, graphics, and related intellectual property remain the property of TracTrac MSL and/or their respective owners unless otherwise stated. Members shall not reproduce, modify, distribute, or commercially exploit such materials without prior written permission.<\u002Fp>\n\n          <h3><span class=\"tcn\">10<\u002Fspan> Third Party Opportunities<\u002Fh3>\n          <p>YPiM may share information regarding scholarships, trainings, grants, jobs, internships, competitions, financing opportunities, and other third party programs. YPiM and TracTrac MSL do not guarantee selection, funding, employment, acceptance, or outcomes related to such opportunities. Members engage with third party opportunities at their own discretion.<\u002Fp>\n\n          <h3><span class=\"tcn\">11<\u002Fspan> Limitation of Liability<\u002Fh3>\n          <p>Participation in YPiM activities is voluntary and may involve exposure to agricultural machinery, equipment demonstrations, field activities, transportation, and other related activities that carry inherent risks. By participating, each participant acknowledges and accepts these risks. To the fullest extent permitted by applicable law, YPiM and its representatives shall not be liable for any loss, damage, injury, illness, accident, delay, theft, or expense incurred by a participant arising from or related to participation, except where it results directly from the gross negligence, willful misconduct, or unlawful acts of the organization.<\u002Fp>\n          <p>Participants agree to exercise reasonable care, follow all safety instructions, use equipment only as authorized and supervised, and comply with all rules and procedures. Participants shall be responsible for their own personal property during such activities. The organization reserves the right to modify, postpone, suspend, or cancel any activity where necessary for safety, security, operational, or other legitimate reasons.<\u002Fp>\n\n          <h3><span class=\"tcn\">12<\u002Fspan> Termination of Membership<\u002Fh3>\n          <p>Membership may be terminated upon voluntary resignation submitted in writing; violation of the Constitution, Bylaws, Code of Conduct, policies, regulations, or lawful decisions of YPiM; conduct detrimental to the interests, objectives, reputation, or operations of YPiM; provision of false, misleading, or fraudulent information; or any other reason determined by the organization to constitute sufficient cause, made in accordance with established procedures and principles of fairness. Termination does not relieve a member of outstanding obligations. Members may also withdraw at any time by notifying YPiM.<\u002Fp>\n\n          <h3><span class=\"tcn\">13<\u002Fspan> Amendments<\u002Fh3>\n          <p>YPiM reserves the right to update, modify, or revise these Terms and Conditions at any time. Updated versions will be published on the YPiM website and will take effect immediately upon publication.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tc-ack\" id=\"tcAck\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14M5 12l7 7 7-7\"><\u002Fpath><\u002Fsvg>\n          <span>Scroll to the end of the terms to continue<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Declaration -->\n      <div class=\"declaration\">\n        <div class=\"dcl-h\">Member Declaration<\u002Fdiv>\n        <p class=\"dcl-lead\">By submitting my application, I confirm that:<\u002Fp>\n        <div class=\"dcl-item\"><input type=\"checkbox\" id=\"d1\" required=\"\"><label for=\"d1\">I have read and understood these Terms and Conditions.<\u002Flabel><\u002Fdiv>\n        <div class=\"dcl-item\"><input type=\"checkbox\" id=\"d2\" required=\"\"><label for=\"d2\">I understand that participation in YPiM is voluntary and unpaid.<\u002Flabel><\u002Fdiv>\n        <div class=\"dcl-item\"><input type=\"checkbox\" id=\"d3\" required=\"\"><label for=\"d3\">I agree to abide by the YPiM Code of Conduct.<\u002Flabel><\u002Fdiv>\n        <div class=\"dcl-item\"><input type=\"checkbox\" id=\"d4\" required=\"\"><label for=\"d4\">I consent to the collection and use of my personal information for program administration purposes.<\u002Flabel><\u002Fdiv>\n        <div class=\"dcl-item\"><input type=\"checkbox\" id=\"d5\" required=\"\"><label for=\"d5\">I certify that the information I provide is accurate and truthful.<\u002Flabel><\u002Fdiv>\n      <\u002Fdiv>\n\n      <button type=\"submit\" class=\"btn btn-green submit-btn\">Submit Application <span class=\"ar\">\u2192<\u002Fspan><\u002Fbutton>\n      <div class=\"note\">Membership is free. Your data is used only for YPiM membership activities.<\u002Fdiv>\n    <\u002Fform>\n\n    <!-- Confirmation -->\n    <div class=\"form-card confirm reveal\" id=\"confirm\">\n      <div class=\"cf-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h2>Application Received<\u002Fh2>\n      <p>Thank you for applying to join Young People in Mechanization (YPiM). We have received your application and will be in touch within 5 working days with your onboarding details and chapter placement. In the meantime, follow us and share the movement with your network.<\u002Fp>\n      <div class=\"cf-hash\"><span>#YPiM<\u002Fspan><span>#YoungPeopleInMechanization<\u002Fspan><span>#TracTrac<\u002Fspan><span>#AgriYouth<\u002Fspan><\u002Fdiv>\n      <div class=\"cf-actions\">\n        <a href=\"YPiM Home.html\" class=\"btn btn-ghost\">Back to Home<\u002Fa>\n        <a href=\"News.html\" class=\"btn btn-green\">Read Stories <span class=\"ar\">\u2192<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer class=\"foot\" id=\"footer\">\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div class=\"foot-brand\">\n        <img src=\"ec019be1-1996-4dd1-93f0-a11a55df1b7d\" alt=\"YPiM\">\n        <p>Nigeria's pioneer youth mechanization movement, powered by TracTrac MSL. Train, earn, advocate and lead in agricultural mechanization.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"foot-col\"><h4>Explore<\u002Fh4><a href=\"/#what\">What We Do<\u002Fa><a>Stories<\u002Fa><a>Contact<\u002Fa><\u002Fdiv>\n      <div class=\"foot-col\"><h4>Get Started<\u002Fh4><a href=\"/apply\">Apply Now<\u002Fa><a>Find a Chapter<\u002Fa><a>Partner With Us<\u002Fa><\u002Fdiv>\n      <div class=\"foot-col\"><h4>Contact<\u002Fh4><a href=\"mailto:info@ypim.africa\">info@ypim.africa<\u002Fa><a>Send a Message<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <span>\u00a9 2026 TracTrac MSL \u00b7 Young People in Mechanization (YPiM)<\u002Fspan>\n      <div class=\"socials\">\n        <a href=\"https://www.instagram.com/ypimglobal?igsh=ZWwwZWw3dng0aGFw&utm_source=qr\" target=\"_blank\" rel=\"noopener\" aria-label=\"Instagram\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"5\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><circle cx=\"17.5\" cy=\"6.5\" r=\"1.2\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<div id=\"toast\">Social links coming soon<\u002Fdiv>\n\n<script>\n// reveal\nconst reveals=[...document.querySelectorAll('.reveal')];\nconst io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{threshold:.08});\nreveals.forEach(el=>io.observe(el));\nsetTimeout(()=>reveals.forEach(el=>el.classList.add('in')),2500);\n\n// nav toggle\nconst nt=document.getElementById('navToggle'),nl=document.getElementById('navLinks');\nnt.addEventListener('click',()=>nl.classList.toggle('open'));\nnl.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>nl.classList.remove('open')));\n\n// toast for soft links\nconst toast=document.getElementById('toast');let tt;\ndocument.querySelectorAll('a[data-soft]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),2400);}));\n\n// checkbox card state\ndocument.querySelectorAll('.check input').forEach(cb=>{\n  cb.addEventListener('change',()=>cb.closest('.check').classList.toggle('on',cb.checked));\n});\n// yes/no segmented state\ndocument.querySelectorAll('.yn input').forEach(rb=>{\n  rb.addEventListener('change',()=>{\n    rb.closest('.yn').querySelectorAll('label').forEach(l=>l.classList.remove('on'));\n    rb.closest('label').classList.add('on');\n  });\n});\n// progress rail tracks focused section\nconst prailSteps=[...document.querySelectorAll('.prail-step')];\nconst formSecs=[...document.querySelectorAll('.form-sec[data-sec]')];\nfunction setStep(n){prailSteps.forEach(s=>s.classList.toggle('active',+s.dataset.step<=n));}\nformSecs.forEach(sec=>{\n  sec.addEventListener('focusin',()=>setStep(+sec.dataset.sec));\n});\n// terms read acknowledgement\nconst tcBox=document.getElementById('tcBox'), tcAck=document.getElementById('tcAck');\ntcBox.addEventListener('scroll',()=>{\n  if(tcBox.scrollTop+tcBox.clientHeight>=tcBox.scrollHeight-8){\n    tcAck.classList.add('read');\n    tcAck.querySelector('span').textContent='You have reached the end of the terms';\n    tcAck.querySelector('svg').innerHTML='<path d=\"M20 6L9 17l-5-5\"/>';\n  }\n});\n// submit -> confirmation\ndocument.getElementById('applyForm').addEventListener('submit',async function(e){\n  e.preventDefault();\n  const form=this;\n  const submitBtn=form.querySelector('.submit-btn');\n  const originalLabel=submitBtn.innerHTML;\n  submitBtn.disabled=true;\n  submitBtn.textContent='Submitting...';\n\n  const data={\n    fullName:form.fullName.value,\n    email:form.email.value,\n    phone:form.phone.value,\n    age:form.age.value,\n    gender:form.gender.value,\n    state:form.state.value,\n    interest:[...form.querySelectorAll('input[name=\"interest\"]:checked')].map(cb=>cb.value),\n    leadership:(form.querySelector('input[name=\"leadership\"]:checked')||{}).value||'',\n    declaration:[...form.querySelectorAll('.declaration input[type=\"checkbox\"]')].every(cb=>cb.checked)\n  };\n\n  try{\n    const res=await fetch('/api/submit-apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});\n    if(!res.ok) throw new Error('Submission failed');\n  }catch(err){\n    submitBtn.disabled=false;\n    submitBtn.innerHTML=originalLabel;\n    alert('Something went wrong submitting your application. Please try again or email info@ypim.africa.');\n    return;\n  }\n\n  form.style.display='none';\n  const c=document.getElementById('confirm');\n  c.classList.add('show','in');\n  window.scrollTo({top:document.querySelector('.page-header').offsetHeight,behavior:'smooth'});\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
